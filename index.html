<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="HSK Trainer">
    <title>HSK Trainer</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root { --bg: #f0f2f5; --card: #fff; --box1: #e74c3c; --box5: #27ae60; --primary: #3498db; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 600px; margin: auto; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
        .nav-buttons { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
        .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 15px; }
        .stat-box { background: #fff; padding: 8px 4px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 0.75rem; font-weight: bold; }
        .card { background: var(--card); padding: 25px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); text-align: center; }
        .hidden { display: none !important; }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; margin-top: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-small { width: auto; padding: 6px 10px; font-size: 0.8rem; }
        #v-box { font-size: 0.9rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; padding: 5px; border-bottom: 1px solid #eee; }
        .writer-grid { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .char-box { width: 200px; height: 200px; border: 2px dashed #ccc; border-radius: 12px; background: #fafafa; }
        .example-box { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #e0e0e0; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav">
        <h2 style="margin: 0; font-size: 1.3rem;">HSK Trainer</h2>
        <div class="nav-buttons">
            <input type="file" id="csvFile" class="hidden" onchange="importCSV(this.files[0])" accept=".csv">
            <button class="btn-small" style="background: var(--primary); color: white;" onclick="document.getElementById('csvFile').click()">+ CSV</button>
            <button class="btn-small" style="background: #f39c12; color: white;" onclick="exportProgress()">💾 Backup</button>
            <input type="file" id="jsonFile" class="hidden" onchange="importProgress(this.files[0])" accept=".json">
            <button class="btn-small" style="background: #27ae60; color: white;" onclick="document.getElementById('jsonFile').click()">📂 Laden</button>
            <button class="btn-small" style="background: #e74c3c; color: white;" onclick="resetSpeicher()">Löschen</button>
        </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="card">
        <div id="v-box"></div>
        <div id="v-de" style="font-size: 1.6rem; font-weight:bold; word-break: break-word;">Bitte CSV laden...</div>
        <div id="v-hz" class="hidden" style="font-size: 3.5rem; margin: 15px 0; color: var(--primary);"></div>
        <div id="v-py" class="hidden" style="font-size: 1.3rem; color: #555;"></div>
        
        <div id="v-example" class="example-box hidden">
            <div id="ex-hz" style="font-size: 1.3rem;"></div>
            <div id="ex-py" style="font-style: italic;"></div>
            <div id="ex-de"></div>
        </div>
        
        <div id="writer-container" class="writer-grid hidden"></div>
        
        <button id="btn-clear" class="btn-small hidden" style="background: #95a5a6; color: white;" onclick="clearCanvas()">Neu versuchen</button>
        <button id="btn-show" class="hidden" style="background: var(--primary); color: white;" onclick="flip()">Lösung anzeigen</button>
        <button id="btn-audio" class="hidden" style="background: var(--primary); color: white;" onclick="speak()">🔊 Aussprache</button>
        
        <div id="controls" class="hidden" style="display: flex; gap: 10px; width: 100%; margin-top: 10px;">
            <button style="background:var(--box1); color:white;" onclick="move(false)">Falsch</button>
            <button style="background:var(--box5); color:white;" onclick="move(true)">Richtig</button>
        </div>
    </div>
</div>

<script>
let state = JSON.parse(localStorage.getItem('hsk_data')) || { box1: [], box2: [], box3: [], box4: [], box5: [] };
let currentCard = null;
let writers = [];

function updateUI() {
    document.getElementById('stats').innerHTML = [1,2,3,4,5].map(i => `<div class="stat-box">B${i}<br>${state['box'+i].length}</div>`).join('');
    localStorage.setItem('hsk_data', JSON.stringify(state));
}

function importCSV(file) {
    if(!file) return;
    const targetBox = confirm("Sollen die neuen Vokabeln direkt in Box 5 (bekannt) einsortiert werden?\nKlicke 'Abbrechen' für Box 1 (neu lernen).") ? 'box5' : 'box1';
    
    const reader = new FileReader();
    reader.onload = (e) => {
        const rows = e.target.result.replace(/\r/g, "").split('\n');
        rows.forEach(r => {
            const p = r.split(',');
            if(p.length >= 3) state[targetBox].push({hz: p[0].trim(), py: p[1].trim(), de: p[2].trim(), sentenceHz: p[3]||'', sentencePy: p[4]||'', sentenceDe: p[5]||''});
        });
        updateUI(); next();
    };
    reader.readAsText(file);
}

function next() {
    let pool = [];
    for(let i=1; i<=5; i++) for(let j=0; j<(6-i); j++) state['box'+i].forEach(c => pool.push({c, box: 'box'+i}));
    if(pool.length === 0) return;
    
    let selection = pool[Math.floor(Math.random() * pool.length)];
    currentCard = selection.c;
    document.getElementById('v-box').innerText = "Aktuelle Box: " + selection.box.toUpperCase();
    document.getElementById('v-de').innerText = currentCard.de;
    
    // UI Reset
    document.getElementById('writer-container').classList.remove('hidden');
    document.getElementById('writer-container').innerHTML = '';
    document.getElementById('v-hz').classList.add('hidden');
    document.getElementById('v-py').classList.add('hidden');
    document.getElementById('v-example').classList.add('hidden');
    document.getElementById('btn-show').classList.remove('hidden');
    document.getElementById('btn-clear').classList.remove('hidden');
    document.getElementById('btn-audio').classList.add('hidden');
    document.getElementById('controls').classList.add('hidden');

    currentCard.hz.replace(/\s/g, '').split('').forEach(char => {
        if(/[\u4e00-\u9fa5]/.test(char)) {
            let div = document.createElement('div'); div.className = 'char-box';
            document.getElementById('writer-container').appendChild(div);
            let writer = HanziWriter.create(div, char, { width: 200, height: 200, showCharacter: false, showOutline: false, padding: 10, strokeColor: '#3498db' });
            writer.quiz(); writers.push(writer);
        }
    });
}

function flip() {
    document.getElementById('v-hz').innerText = currentCard.hz;
    document.getElementById('v-py').innerText = currentCard.py;
    document.getElementById('v-hz').classList.remove('hidden');
    document.getElementById('v-py').classList.remove('hidden');
    if (currentCard.sentenceHz) {
        document.getElementById('ex-hz').innerText = currentCard.sentenceHz;
        document.getElementById('ex-py').innerText = currentCard.sentencePy;
        document.getElementById('ex-de').innerText = currentCard.sentenceDe;
        document.getElementById('v-example').classList.remove('hidden');
    }
    document.getElementById('writer-container').classList.add('hidden');
    document.getElementById('btn-show').classList.add('hidden');
    document.getElementById('btn-clear').classList.add('hidden');
    document.getElementById('btn-audio').classList.remove('hidden');
    document.getElementById('controls').classList.remove('hidden');
}

function move(ok) {
    let oldBox = Object.keys(state).find(k => state[k].includes(currentCard));
    state[oldBox] = state[oldBox].filter(c => c !== currentCard);
    state['box' + (ok ? Math.min(parseInt(oldBox.replace('box','')) + 1, 5) : 1)].push(currentCard);
    updateUI(); next();
}

function resetSpeicher() { if(confirm("Alles löschen?")) { state = { box1: [], box2: [], box3: [], box4: [], box5: [] }; updateUI(); location.reload(); } }
function exportProgress() { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state)); const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "hsk_backup.json"); dl.click(); }
function importProgress(file) { const reader = new FileReader(); reader.onload = (e) => { state = JSON.parse(e.target.result); updateUI(); next(); }; reader.readAsText(file); }
function clearCanvas() { writers.forEach(w => { w.cancelQuiz(); w.quiz(); }); }
function speak() { const u = new SpeechSynthesisUtterance(currentCard.hz); u.lang = 'zh-CN'; window.speechSynthesis.speak(u); }

updateUI(); next();
</script>
</body>
</html>
