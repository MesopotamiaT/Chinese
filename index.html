<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="HSK Trainer">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f0f2f5">
    
    <title>HSK Trainer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>

    <style>
        :root { 
            --bg: #f0f2f5; 
            --card: #fff; 
            --box1: #e74c3c; 
            --box5: #27ae60; 
            --primary: #3498db; 
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 15px; 
            color: #333; 
            overscroll-behavior-y: contain; 
        }
        .container { max-width: 600px; margin: auto; }
        .nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            gap: 10px; 
        }
        .nav-buttons { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
        .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 15px; }
        .stat-box { 
            background: #fff; 
            padding: 8px 4px; 
            border-radius: 8px; 
            text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            font-size: 0.75rem; 
            font-weight: bold; 
        }
        .card { 
            background: var(--card); 
            padding: 25px 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: relative; 
        }
        .hidden { display: none !important; }
        button { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: none; 
            margin-top: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem; 
            transition: opacity 0.1s ease;
        }
        button:active { opacity: 0.8; }
        .btn-small { width: auto; padding: 6px 10px; font-size: 0.8rem; }
        
        #v-box { font-size: 0.75rem; font-weight: bold; color: white; background: #95a5a6; padding: 3px 10px; border-radius: 10px; margin-bottom: 15px; }
        
        .writer-grid {
            display: flex; 
            gap: 10px; 
            justify-content: center; 
            flex-wrap: wrap; 
            margin: 15px 0; 
            width: 100%;
        }
        .char-box {
            flex: 0 0 200px;
            width: 200px;
            height: 200px;
            border: 2px dashed #ccc;
            border-radius: 12px;
            background: linear-gradient(to right, transparent 49%, #e0e0e0 49%, #e0e0e0 51%, transparent 51%),
                        linear-gradient(to bottom, transparent 49%, #e0e0e0 49%, #e0e0e0 51%, transparent 51%), #fafafa;
            touch-action: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.03);
            cursor: crosshair;
        }

        .example-box {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #e0e0e0;
            width: 100%;
            text-align: center;
            display: block;
        }
        .ex-hz { display: block; font-size: 1.3rem; color: #2c3e50; font-weight: 500; word-break: break-word; margin-bottom: 8px; }
        .ex-py { display: block; font-size: 1rem; color: #7f8c8d; font-style: italic; word-break: break-word; margin-bottom: 8px; }
        .ex-de { display: block; font-size: 1rem; color: #34495e; word-break: break-word; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav">
        <h2 style="margin: 0; font-size: 1.3rem;">HSK Trainer</h2>
        <div class="nav-buttons">
            <input type="file" id="csvFile" class="hidden" onchange="importCSV(this.files[0])" accept=".csv">
            <button class="btn-small" style="background: var(--primary); color: white;" onclick="document.getElementById('csvFile').click()">+ CSV</button>
            <button class="btn-small" style="background: #f39c12; color: white;" onclick="exportProgress()">💾 Backup</button>
            <input type="file" id="jsonFile" class="hidden" onchange="importProgress(this.files[0])" accept=".json">
            <button class="btn-small" style="background: #27ae60; color: white;" onclick="document.getElementById('jsonFile').click()">📂 Laden</button>
            <button class="btn-small" style="background: #e74c3c; color: white;" onclick="resetSpeicher()">Löschen</button>
        </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="card">
        <div id="v-box" class="hidden"></div>
        <div id="v-de" style="font-size: 1.6rem; font-weight:bold; word-break: break-word;">Bitte CSV oder Backup laden...</div>
        
        <div id="v-hz" class="hidden" style="font-size: 3.5rem; margin: 15px 0 5px 0; color: var(--primary); line-height: 1.1; letter-spacing: 2px;"></div>
        <div id="v-py" class="hidden" style="font-size: 1.3rem; color: #555; margin-bottom: 10px;"></div>
        
        <div id="v-example" class="example-box hidden">
            <div id="ex-hz" class="ex-hz"></div>
            <div id="ex-py" class="ex-py"></div>
            <div id="ex-de" class="ex-de"></div>
        </div>
        
        <div id="writer-container" class="writer-grid hidden"></div>
        
        <button id="btn-clear" class="btn-small hidden" style="background: #95a5a6; color: white; margin-top: 5px;" onclick="clearCanvas()">Neu versuchen</button>
        <button id="btn-show" class="hidden" style="background: var(--primary); color: white;" onclick="flip()">Lösung anzeigen</button>
        
        <button id="btn-audio" class="hidden" style="background: var(--primary); color: white;" onclick="speak()">🔊 Aussprache anhören</button>
        
        <div id="controls" class="hidden" style="display: flex; gap: 10px; width: 100%; margin-top: 10px;">
            <button style="background:var(--box1); color:white;" onclick="move(false)">Falsch (B1)</button>
            <button style="background:var(--box5); color:white;" onclick="move(true)">Richtig (Vor)</button>
            <button style="background:#34495e; color:white;" onclick="moveToMax()">Weiß ich (B5)</button>
        </div>
    </div>
</div>

<script>
let state = JSON.parse(localStorage.getItem('hsk_data')) || { box1: [], box2: [], box3: [], box4: [], box5: [] };
let currentCard = null;
let writers = [];

function updateUI() {
    document.getElementById('stats').innerHTML = [1,2,3,4,5].map(i => `<div class="stat-box">B${i}<br>${state['box'+i].length}</div>`).join('');
    localStorage.setItem('hsk_data', JSON.stringify(state));
}

function resetSpeicher() {
    if(confirm("Bist du sicher? Dein gesamter Fortschritt wird gelöscht!")) { 
        state = { box1: [], box2: [], box3: [], box4: [], box5: [] }; 
        updateUI(); 
        next(); 
    }
}

function importCSV(file) {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const rows = e.target.result.replace(/\r/g, "").split('\n');
        let importCount = 0;
        rows.forEach(r => {
            if (!r.trim()) return;
            const p = r.split(',');
            if(p.length >= 3) {
                state.box1.push({hz: p[0].trim(), py: p[1].trim(), de: p[2].trim(), sentenceHz: p[3]||'', sentencePy: p[4]||'', sentenceDe: p[5]||''});
                importCount++;
            }
        });
        updateUI(); next(); 
        alert(importCount + " Vokabeln geladen!");
        document.getElementById('csvFile').value = "";
    };
    reader.readAsText(file);
}

function exportProgress() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
    const dlAnchorElem = document.createElement('a');
    dlAnchorElem.setAttribute("href", dataStr);
    dlAnchorElem.setAttribute("download", "hsk_backup.json");
    dlAnchorElem.click();
}

function importProgress(file) {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        state = JSON.parse(e.target.result);
        updateUI(); next();
    };
    reader.readAsText(file);
}

function next() {
    let pool = [];
    for(let i=1; i<=5; i++) for(let j=0; j<(6-i); j++) state['box'+i].forEach(c => pool.push(c));
    if(pool.length === 0) return;
    
    currentCard = pool[Math.floor(Math.random() * pool.length)];
    const boxNum = Object.keys(state).find(k => state[k].includes(currentCard)).replace('box', '');
    document.getElementById('v-box').innerText = "Box " + boxNum;
    document.getElementById('v-de').innerText = currentCard.de;
    
    const container = document.getElementById('writer-container');
    container.innerHTML = ''; 
    container.classList.remove('hidden');
    writers = [];
    
    currentCard.hz.replace(/\s/g, '').split('').forEach(char => {
        if(/[\u4e00-\u9fa5]/.test(char)) {
            let div = document.createElement('div');
            div.className = 'char-box';
            container.appendChild(div);
            let writer = HanziWriter.create(div, char, { width: 200, height: 200, showCharacter: false, showOutline: false, padding: 10, strokeColor: '#3498db' });
            writer.quiz();
            writers.push(writer);
        }
    });

    document.getElementById('btn-show').classList.remove('hidden');
    document.getElementById('btn-clear').classList.remove('hidden');
    document.getElementById('v-hz').classList.add('hidden');
    document.getElementById('v-py').classList.add('hidden');
    document.getElementById('v-example').classList.add('hidden');
    document.getElementById('btn-audio').classList.add('hidden');
    document.getElementById('controls').classList.add('hidden');
}

function flip() {
    document.getElementById('v-hz').innerText = currentCard.hz;
    document.getElementById('v-py').innerText = currentCard.py;
    document.getElementById('v-hz').classList.remove('hidden');
    document.getElementById('v-py').classList.remove('hidden');
    if (currentCard.sentenceHz) {
        document.getElementById('ex-hz').innerText = currentCard.sentenceHz;
        document.getElementById('ex-py').innerText = currentCard.sentencePy;
        document.getElementById('ex-de').innerText = currentCard.sentenceDe;
        document.getElementById('v-example').classList.remove('hidden');
    }
    document.getElementById('writer-container').classList.add('hidden');
    document.getElementById('btn-show').classList.add('hidden');
    document.getElementById('btn-clear').classList.add('hidden');
    document.getElementById('btn-audio').classList.remove('hidden');
    document.getElementById('controls').classList.remove('hidden');
}

function speak() {
    const u = new SpeechSynthesisUtterance(currentCard.hz.replace(/\s/g, ''));
    u.lang = 'zh-CN';
    window.speechSynthesis.speak(u);
}

function move(ok) {
    let oldBox = Object.keys(state).find(k => state[k].includes(currentCard));
    state[oldBox] = state[oldBox].filter(c => c !== currentCard);
    state['box' + (ok ? Math.min(parseInt(oldBox.replace('box','')) + 1, 5) : 1)].push(currentCard);
    updateUI(); next();
}

function moveToMax() {
    let oldBox = Object.keys(state).find(k => state[k].includes(currentCard));
    state[oldBox] = state[oldBox].filter(c => c !== currentCard);
    state.box5.push(currentCard);
    updateUI(); next();
}

function clearCanvas() { writers.forEach(w => { w.cancelQuiz(); w.quiz(); }); }

updateUI(); next();
</script>
</body>
</html>
