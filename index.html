<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f0f2f5">
    
    <title>HSK Trainer</title>
    <style>
        :root { --bg: #f0f2f5; --card: #fff; --box1: #e74c3c; --box5: #27ae60; --primary: #3498db; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; overscroll-behavior-y: contain; }
        .container { max-width: 500px; margin: auto; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 20px; }
        .stat-box { background: #fff; padding: 10px 5px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 0.75rem; font-weight: bold; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none !important; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; margin-top: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-small { width: auto; padding: 10px 15px; font-size: 0.9rem; }
        #drawCanvas { border: 2px dashed #ccc; border-radius: 12px; background: #fafafa; touch-action: none; margin-top: 20px; margin-bottom: 5px; cursor: crosshair; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav">
        <h2 style="margin: 0; font-size: 1.2rem;">HSK Trainer</h2>
        <div style="display: flex; gap: 5px;">
            <button class="btn-small" style="background: #e74c3c; color: white;" onclick="resetSpeicher()">Löschen</button>
            <input type="file" id="csvFile" class="hidden" onchange="importCSV(this.files[0])">
            <button class="btn-small" style="background: var(--primary); color: white;" onclick="document.getElementById('csvFile').click()">+ CSV</button>
        </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="card">
        <div id="v-de" style="font-size: 1.8rem; font-weight:bold;">Bitte CSV importieren...</div>
        <div id="v-hz" class="hidden" style="font-size: 4rem; margin: 15px 0 5px 0; color: var(--primary); line-height: 1;"></div>
        <div id="v-py" class="hidden" style="font-size: 1.4rem; color: #555; margin-bottom: 10px;"></div>
        <canvas id="drawCanvas" width="280" height="280" class="hidden"></canvas>
        <button id="btn-clear" class="btn-small hidden" style="background: #95a5a6; color: white; margin-top: 5px;" onclick="clearCanvas()">Zeichnung löschen</button>
        <button id="btn-show" class="hidden" style="background: var(--primary); color: white;" onclick="flip()">Lösung anzeigen</button>
        <div id="controls" class="hidden" style="display: flex; gap: 10px; width: 100%;">
            <button style="background:var(--box1); color:white;" onclick="move(false)">Falsch</button>
            <button style="background:var(--box5); color:white;" onclick="move(true)">Richtig</button>
        </div>
    </div>
</div>

<script>
// --- DATENSPEICHER ---
let state = JSON.parse(localStorage.getItem('hsk_data')) || { box1: [], box2: [], box3: [], box4: [], box5: [] };
let currentCard = null;

function updateUI() {
    document.getElementById('stats').innerHTML = [1,2,3,4,5].map(i => `<div class="stat-box">B${i}<br>${state['box'+i].length}</div>`).join('');
    localStorage.setItem('hsk_data', JSON.stringify(state));
}

function resetSpeicher() {
    if(confirm("Alles zurücksetzen?")) {
        state = { box1: [], box2: [], box3: [], box4: [], box5: [] };
        updateUI(); next();
    }
}

function importCSV(file) {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const rows = e.target.result.replace(/\r/g, "").split('\n');
        let count = 0;
        rows.forEach(r => {
            const p = r.includes(';') ? r.split(';') : r.split(',');
            if(p.length >= 3) {
                state.box1.push({de: p[2].trim(), hz: p[0].trim(), py: p[1].trim()});
                count++;
            }
        });
        updateUI(); next();
        alert(count + " Vokabeln geladen!");
    };
    reader.readAsText(file);
}

function next() {
    clearCanvas();
    let pool = [];
    for(let i=1; i<=5; i++) for(let j=0; j<(6-i); j++) state['box'+i].forEach(c => pool.push(c));
    if(pool.length === 0) return;
    currentCard = pool[Math.floor(Math.random() * pool.length)];
    document.getElementById('v-de').innerText = currentCard.de;
    document.getElementById('drawCanvas').classList.remove('hidden');
    document.getElementById('btn-show').classList.remove('hidden');
    document.getElementById('btn-clear').classList.remove('hidden');
    document.getElementById('v-hz').classList.add('hidden');
    document.getElementById('v-py').classList.add('hidden');
    document.getElementById('controls').classList.add('hidden');
}

function flip() {
    document.getElementById('v-hz').innerText = currentCard.hz;
    document.getElementById('v-py').innerText = currentCard.py;
    document.getElementById('v-hz').classList.remove('hidden');
    document.getElementById('v-py').classList.remove('hidden');
    document.getElementById('btn-show').classList.add('hidden');
    document.getElementById('btn-clear').classList.add('hidden');
    document.getElementById('controls').classList.remove('hidden');
}

function move(ok) {
    let oldBox = Object.keys(state).find(k => state[k].includes(currentCard));
    let idx = parseInt(oldBox.replace('box', ''));
    state[oldBox] = state[oldBox].filter(c => c !== currentCard);
    let nextIdx = ok ? Math.min(idx + 1, 5) : 1;
    state['box' + nextIdx].push(currentCard);
    updateUI(); next();
}

// --- KALLIGRAPHIE LOGIK ---
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');
let isDrawing = false, points = [];

ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#2c3e50';

function getPos(e) {
    let rect = canvas.getBoundingClientRect();
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
}

function startDrawing(e) { isDrawing = true; points = [getPos(e)]; }

function draw(e) {
    if (!isDrawing) return;
    e.preventDefault();
    points.push(getPos(e));
    if (points.length < 3) return;
    let p1 = points[points.length - 2], p2 = points[points.length - 1];
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.quadraticCurveTo(p1.x, p1.y, p2.x, p2.y);
    ctx.lineWidth = 6;
    ctx.stroke();
}

canvas.addEventListener('mousedown', startDrawing);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', () => isDrawing = false);
canvas.addEventListener('touchstart', startDrawing, {passive: false});
canvas.addEventListener('touchmove', draw, {passive: false});
canvas.addEventListener('touchend', () => isDrawing = false);

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

updateUI(); next();
</script>
</body>
</html>
