<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>HSK Trainer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; background: #f4f7f6; }
        .container { width: 100%; max-width: 500px; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px; }
        button { padding: 15px; margin-top: 10px; width: 100%; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="card" id="card" onclick="flip()">
        <div id="v-de" style="font-weight:bold; font-size:1.5rem;">Lade Vokabeln...</div>
        <div id="v-hanzi" style="display:none; font-size:2.5rem; margin:10px;"></div>
        <div id="v-pinyin" style="display:none; color:#666;"></div>
    </div>
    <button onclick="beantworte(true)" style="background:#27ae60; color:white;">Richtig</button>
    <button onclick="beantworte(false)" style="background:#e74c3c; color:white;">Falsch</button>
</div>

<script>
let pool = [];
// Lade die CSV-Datei automatisch von deinem GitHub-Server
fetch('vokabeln.csv')
    .then(response => response.text())
    .then(data => {
        let lines = data.split('\n');
        lines.slice(1).forEach(line => {
            let [hsk, de, hz, py] = line.split(',');
            if(de) pool.push({deutsch: de, hanzi: hz, pinyin: py});
        });
        next();
    });

let current = null;
function next() {
    current = pool[Math.floor(Math.random() * pool.length)];
    document.getElementById('v-de').innerText = current.deutsch;
    document.getElementById('v-hanzi').style.display = 'none';
    document.getElementById('v-pinyin').style.display = 'none';
}
function flip() {
    document.getElementById('v-hanzi').innerText = current.hanzi;
    document.getElementById('v-hanzi').style.display = 'block';
    document.getElementById('v-pinyin').innerText = current.pinyin;
    document.getElementById('v-pinyin').style.display = 'block';
}
function beantworte(ok) { next(); }
</script>
</body>
</html>
