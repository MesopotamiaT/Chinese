<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="HSK Trainer">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f0f2f5">
    
    <title>HSK Trainer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>

    <style>
        :root { --bg: #f0f2f5; --card: #fff; --box1: #e74c3c; --box5: #27ae60; --primary: #3498db; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; overscroll-behavior-y: contain; }
        .container { max-width: 500px; margin: auto; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
        .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 20px; }
        .stat-box { background: #fff; padding: 10px 5px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 0.75rem; font-weight: bold; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; display: flex; flex-direction: column; align-items: center; position: relative; }
        .hidden { display: none !important; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; margin-top: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-small { width: auto; padding: 10px 15px; font-size: 0.9rem; }
        
        #v-box {
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            background: #95a5a6;
            padding: 4px 12px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        /* Neues Styling für die Hanzi-Zeichenboxen inkl. Hilfslinien */
        .char-box {
            border: 2px dashed #ccc;
            border-radius: 12px;
            background: 
                linear-gradient(to right, transparent 49%, #e0e0e0 49%, #e0e0e0 51%, transparent 51%),
                linear-gradient(to bottom, transparent 49%, #e0e0e0 49%, #e0e0e0 51%, transparent 51%),
                #fafafa;
            touch-action: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            cursor: crosshair;
            position: relative;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="nav">
        <h2 style="margin: 0; font-size: 1.2rem;">HSK Trainer</h2>
        <div style="display: flex; gap: 5px;">
            <button class="btn-small" style="background: #e74c3c; color: white; margin: 0;" onclick="resetSpeicher()">Löschen</button>
            <input type="file" id="csvFile" class="hidden" onchange="importCSV(this.files[0])">
            <button class="btn-small" style="background: var(--primary); color: white; margin: 0;" onclick="document.getElementById('csvFile').click()">+ CSV</button>
        </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="card">
        <div id="v-box" class="hidden"></div>
        
        <div id="v-de" style="font-size: 1.8rem; font-weight:bold;">Bitte CSV importieren...</div>
        
        <div id="v-hz" class="hidden" style="font-size: 4rem; margin: 15px 0 5px 0; color: var(--primary); line-height: 1;"></div>
        <div id="v-py" class="hidden" style="font-size: 1.4rem; color: #555; margin-bottom: 10px;"></div>
        
        <div id="writer-container" class="hidden" style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 20px; margin-bottom: 5px; width: 100%;"></div>
        
        <button id="btn-clear" class="btn-small hidden" style="background: #95a5a6; color: white; margin-top: 5px;" onclick="clearCanvas()">Eingabe neu starten</button>
        
        <button id="btn-show" class="hidden" style="background: var(--primary); color: white;" onclick="flip()">Lösung anzeigen</button>
        
        <div id="controls" class="hidden" style="display: flex; gap: 10px; width: 100%;">
            <button style="background:var(--box1); color:white;" onclick="move(false)">Falsch (B1)</button>
            <button style="background:var(--box5); color:white;" onclick="move(true)">Richtig (Vor)</button>
            <button style="background:#34495e; color:white;" onclick="moveToMax()">Weiß ich (B5)</button>
        </div>
    </div>
</div>

<script>
// --- DATENSPEICHER & LOGIK ---
let state = JSON.parse(localStorage.getItem('hsk_data')) || { box1: [], box2: [], box3: [], box4: [], box5: [] };
let currentCard = null;
let writers = []; // Speichert die aktiven HanziWriter Instanzen

function updateUI() {
    document.getElementById('stats').innerHTML = [1,2,3,4,5].map(i => `<div class="stat-box">B${i}<br>${state['box'+i].length}</div>`).join('');
    localStorage.setItem('hsk_data', JSON.stringify(state));
}

function resetSpeicher() {
    if(confirm("Speicher löschen und neu anfangen?")) {
        state = { box1: [], box2: [], box3: [], box4: [], box5: [] };
        updateUI();
        next();
    }
}

function importCSV(file) {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const rows = e.target.result.replace(/\r/g, "").split('\n');
        let importCount = 0;
        const hasHanzi = (str) => /[\u4e00-\u9fa5]/.test(str);

        rows.forEach(r => {
            const parts = r.split(',');
            if(parts.length >= 3) {
                let c1 = parts[0] ? parts[0].trim() : "";
                let c2 = parts[1] ? parts[1].trim() : "";
                let c3 = parts[2] ? parts[2].trim() : "";
                let c4 = parts[3] ? parts[3].trim() : "";
                let de = "", hz = "", py = "";

                if (hasHanzi(c1)) {
                    hz = c1; py = c2; de = c3;
                    if(parts.length >= 4) de = c4;
                } else if (hasHanzi(c2)) {
                    de = c1; hz = c2; py = c3;
                } else if (hasHanzi(c3)) {
                    de = c2; hz = c3; py = c4;
                }

                if(de && hz && de.toLowerCase() !== "deutsch" && de.toLowerCase() !== "german") {
                    if(![1,2,3,4,5].some(i => state['box'+i].some(c => c.de === de))) {
                        state.box1.push({de: de, hz: hz, py: py});
                        importCount++;
                    }
                }
            }
        });
        document.getElementById('csvFile').value = ""; 
        updateUI(); next();
        alert(importCount + " Vokabeln importiert!");
    };
    reader.readAsText(file);
}

function next() {
    let pool = [];
    for(let i=1; i<=5; i++) {
        for(let j=0; j<(6-i); j++) state['box'+i].forEach(c => pool.push(c));
    }
    
    if(pool.length === 0) { 
        document.getElementById('v-de').innerText = "Bitte CSV importieren..."; 
        document.getElementById('writer-container').classList.add('hidden');
        document.getElementById('btn-show').classList.add('hidden');
        document.getElementById('btn-clear').classList.add('hidden');
        document.getElementById('v-hz').classList.add('hidden');
        document.getElementById('v-py').classList.add('hidden');
        document.getElementById('controls').classList.add('hidden');
        document.getElementById('v-box').classList.add('hidden');
        currentCard = null;
        return; 
    }
    
    currentCard = pool[Math.floor(Math.random() * pool.length)];
    
    // Aktuelle Box ermitteln und anzeigen
    let currentBoxName = Object.keys(state).find(k => state[k].includes(currentCard));
    document.getElementById('v-box').innerText = currentBoxName.replace('box', 'Box ');
    document.getElementById('v-box').classList.remove('hidden');

    document.getElementById('v-de').innerText = currentCard.de;
    
    // --- HANZI WRITER INITIALISIERUNG ---
    const container = document.getElementById('writer-container');
    container.innerHTML = ''; // Vorherige Zeichen löschen
    container.classList.remove('hidden');
    writers = [];
    
    // Zeichenkette bereinigen (Leerzeichen entfernen) und in Array aufteilen
    const chars = currentCard.hz.replace(/\s/g, '').split('');
    
    // Dynamische Größe berechnen, je nachdem wie viele Zeichen das Wort hat
    const size = chars.length >= 3 ? 90 : (chars.length === 2 ? 120 : 220);
    
    chars.forEach(char => {
        // Nur chinesische Zeichen verarbeiten
        if(/[\u4e00-\u9fa5]/.test(char)) {
            let div = document.createElement('div');
            div.className = 'char-box';
            div.style.width = size + 'px';
            div.style.height = size + 'px';
            container.appendChild(div);

            let writer = HanziWriter.create(div, char, {
                width: size,
                height: size,
                showCharacter: false,
                showOutline: true,
                showHintAfterMisses: 2, // Zeigt den Strich nach 2 Fehlern als Hilfe
                padding: 5,
                strokeColor: '#3498db',
                drawingWidth: 15
            });
            writer.quiz(); // Quiz-Modus starten (Snapping / Stricherkennung)
            writers.push(writer);
        }
    });

    document.getElementById('btn-show').classList.remove('hidden');
    document.getElementById('btn-clear').classList.remove('hidden');
    document.getElementById('v-hz').classList.add('hidden');
    document.getElementById('v-py').classList.add('hidden');
    document.getElementById('controls').classList.add('hidden');
}

function flip() {
    if(!currentCard) return;
    document.getElementById('v-hz').innerText = currentCard.hz;
    document.getElementById('v-py').innerText = currentCard.py;
    document.getElementById('v-hz').classList.remove('hidden');
    document.getElementById('v-py').classList.remove('hidden');
    document.getElementById('btn-show').classList.add('hidden');
    document.getElementById('btn-clear').classList.add('hidden');
    document.getElementById('controls').classList.remove('hidden');
    document.getElementById('writer-container').classList.add('hidden');
}

function move(ok) {
    let oldBox = Object.keys(state).find(k => state[k].includes(currentCard));
    let idx = parseInt(oldBox.replace('box', ''));
    state[oldBox] = state[oldBox].filter(c => c.de !== currentCard.de);
    let nextIdx = ok ? Math.min(idx + 1, 5) : 1;
    state['box' + nextIdx].push(currentCard);
    updateUI(); next();
}

function moveToMax() {
    if(!currentCard) return;
    let oldBox = Object.keys(state).find(k => state[k].includes(currentCard));
    state[oldBox] = state[oldBox].filter(c => c.de !== currentCard.de);
    state.box5.push(currentCard);
    updateUI(); next();
}

function clearCanvas() { 
    // Startet das Quiz für alle Zeichen neu
    writers.forEach(writer => {
        writer.hideCharacter();
        writer.quiz();
    });
}

updateUI(); next();
</script>
</body>
</html>
