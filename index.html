<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Leitner Pro</title>
    <style>
        :root { --bg: #f0f2f5; --card: #fff; --box1: #e74c3c; --box5: #27ae60; --primary: #3498db; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 20px; }
        .stat-box { background: #fff; padding: 10px 5px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 0.75rem; font-weight: bold; }
        .card { background: var(--card); padding: 40px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; cursor: pointer; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hidden { display: none; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; margin-top: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav">
        <h2>HSK Trainer</h2>
        <input type="file" id="csvFile" style="display:none" onchange="importCSV(this.files[0])">
        <button onclick="document.getElementById('csvFile').click()" style="width:auto; padding: 10px;">CSV Import</button>
    </div>

    <div class="stats" id="stats"></div>

    <div class="card" onclick="flip()">
        <div id="v-de" style="font-size: 1.5rem; font-weight:bold;">Datei importieren zum Starten</div>
        <div id="v-hz" class="hidden" style="font-size: 3rem; margin: 15px;"></div>
        <div id="v-py" class="hidden" style="font-size: 1.3rem; color: #666;"></div>
    </div>

    <div id="controls" class="hidden">
        <button style="background:var(--box1); color:white;" onclick="move(false)">Nochmal (B1)</button>
        <button style="background:var(--box5); color:white;" onclick="move(true)">Gewusst (Vor)</button>
    </div>
</div>

<script>
let state = JSON.parse(localStorage.getItem('hsk_data')) || { box1: [], box2: [], box3: [], box4: [], box5: [] };
let currentCard = null;

function updateUI() {
    document.getElementById('stats').innerHTML = [1,2,3,4,5].map(i => `<div class="stat-box">B${i}<br>${state['box'+i].length}</div>`).join('');
    localStorage.setItem('hsk_data', JSON.stringify(state));
}

function importCSV(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
        const rows = e.target.result.replace(/\r/g, "").split('\n');
        let count = 0;
        rows.forEach(r => {
            const parts = r.split(',');
            if(parts.length >= 3) {
                const [de, hz, py] = parts;
                // Importiere, wenn Vokabel noch nirgendwo existiert
                if(![1,2,3,4,5].some(i => state['box'+i].some(c => c.de === de.trim()))) {
                    state.box1.push({de: de.trim(), hz: hz.trim(), py: py.trim()});
                    count++;
                }
            }
        });
        updateUI(); next();
        alert(count + " neue Vokabeln importiert!");
    };
    reader.readAsText(file);
}

function next() {
    // Wahrscheinlichkeit: Box 1 am höchsten
    let pool = [];
    state.box1.forEach(() => pool.push('box1'));
    state.box1.forEach(() => pool.push('box1')); // Gewichtung: Box 1 kommt doppelt so oft vor
    state.box2.forEach(() => pool.push('box2'));
    state.box3.forEach(() => pool.push('box3'));
    state.box4.forEach(() => pool.push('box4'));
    state.box5.forEach(() => pool.push('box5'));

    let box = pool[Math.floor(Math.random() * pool.length)] || Object.keys(state).find(b => state[b].length > 0);
    
    if(!box) { document.getElementById('v-de').innerText = "Bitte CSV importieren!"; return; }
    
    currentCard = state[box][Math.floor(Math.random() * state[box].length)];
    document.getElementById('v-de').innerText = currentCard.de;
    document.getElementById('v-hz').classList.add('hidden');
    document.getElementById('v-py').classList.add('hidden');
    document.getElementById('controls').classList.add('hidden');
}

function flip() {
    document.getElementById('v-hz').innerText = currentCard.hz;
    document.getElementById('v-py').innerText = currentCard.py;
    document.getElementById('v-hz').classList.remove('hidden');
    document.getElementById('v-py').classList.remove('hidden');
    document.getElementById('controls').classList.remove('hidden');
}

function move(ok) {
    let oldBox = Object.keys(state).find(k => state[k].includes(currentCard));
    let idx = parseInt(oldBox[3]);
    state[oldBox] = state[oldBox].filter(c => c !== currentCard);
    let nextIdx = ok ? Math.min(idx + 1, 5) : 1;
    state['box' + nextIdx].push(currentCard);
    updateUI(); next();
}

updateUI(); next();
</script>
</body>
</html>
